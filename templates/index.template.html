  <!-- Project Modal Popup Script -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const modal = document.getElementById('projectModal');
      const modalOverlay = modal.querySelector('.project-modal-overlay');
      const modalClose = modal.querySelector('.project-modal-close');
      const projectCards = document.querySelectorAll('.project-card-clickable');

      function getCardActionUrl(card, attributeName, selector) {
        const dataUrl = card.getAttribute(attributeName);
        if (dataUrl && dataUrl !== '#') {
          return dataUrl;
        }

        const actionLink = card.querySelector(selector);
        if (!actionLink) {
          return '';
        }

        const href = actionLink.getAttribute('href') || '';
        return href !== '#' ? href : '';
      }

      // Open modal function
      function openModal(card) {
        const title = card.getAttribute('data-title');
        const subtitle = card.getAttribute('data-subtitle');
        const description = card.getAttribute('data-description');
        const tech = card.getAttribute('data-tech');
        const image = card.getAttribute('data-image');
        const project = card.getAttribute('data-project');

        // Set modal content
        document.getElementById('modalProjectTitle').textContent = title;
        document.getElementById('modalProjectSubtitle').textContent = subtitle;
        document.getElementById('modalProjectDescription').textContent = description;
        document.getElementById('modalProjectTech').textContent = tech;
        document.getElementById('modalProjectImage').src = image;
        document.getElementById('modalProjectImage').alt = title;

        const githubUrl = getCardActionUrl(card, 'data-github-url', '.github-icon-btn');
        const demoUrl = getCardActionUrl(card, 'data-demo-url', '.demo-btn-outline');
        const modalGithub = document.getElementById('modalGithubLink');
        const modalDemo = document.getElementById('modalDemoLink');

        modalGithub.href = githubUrl || '#';
        modalGithub.style.display = githubUrl ? 'inline-block' : 'none';

        modalDemo.href = demoUrl || '#';
        modalDemo.style.display = demoUrl ? 'inline-block' : 'none';

        // Show modal with animation
        modal.style.display = 'block';
        setTimeout(() => {
          modal.classList.add('modal-active');
        }, 10);
        document.body.style.overflow = 'hidden';
      }

      // Close modal function
      function closeModal() {
        modal.classList.remove('modal-active');
        setTimeout(() => {
          modal.style.display = 'none';
          document.body.style.overflow = '';
        }, 300);
      }

      // Add click event to cards
      projectCards.forEach(card => {
        card.style.cursor = 'pointer';
        card.addEventListener('click', (e) => {
          // Don't open modal if clicking on links or buttons
          if (e.target.closest('a') || e.target.closest('button')) {
            return;
          }
          openModal(card);
        });
      });

      // Close modal events
      modalClose.addEventListener('click', closeModal);
      modalOverlay.addEventListener('click', closeModal);

      // Close on Escape key
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('modal-active')) {
          closeModal();
        }
      });
    });
  </script>

  <!-- Navigation UX Enhancements -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const progressBar = document.querySelector('.scroll-progress');
      const navBar = document.querySelector('nav.sticky-top');
      const navLinks = document.querySelectorAll('.nav-link-ux');

      const navTargets = Array.from(navLinks)
        .map(link => {
          const href = link.getAttribute('href');
          if (!href || !href.startsWith('#')) return null;
          const target = document.querySelector(href);
          if (!target) return null;
          return { link, target };
        })
        .filter(Boolean);

      const updateProgress = () => {
        if (!progressBar) return;
        const scrollTop = window.scrollY;
        const docHeight = document.body.scrollHeight - window.innerHeight;
        const progress = docHeight > 0 ? Math.min((scrollTop / docHeight) * 100, 100) : 0;
        progressBar.style.width = `${progress}%`;
      };

      const updateNavState = () => {
        const triggerLine = window.scrollY + window.innerHeight * 0.35;
        let activeLink = null;

        navTargets.forEach(({ link, target }) => {
          const top = target.offsetTop;
          const bottom = top + target.offsetHeight;
          if (triggerLine >= top && triggerLine < bottom) {
            activeLink = link;
          }
        });

        navLinks.forEach(link => {
          link.classList.toggle('active', link === activeLink);
        });
      };

      const handleScrollState = () => {
        updateProgress();
        updateNavState();
        if (navBar) {
          navBar.classList.toggle('nav-scrolled', window.scrollY > 24);
        }
      };

      updateProgress();
      updateNavState();
      handleScrollState();

      window.addEventListener('scroll', handleScrollState, { passive: true });
      window.addEventListener('resize', updateProgress);
    });
  </script>

  <!-- Lightweight Visual Highlights Animation - Vanilla JS + CSS -->
  <script>
    (function() {
      'use strict';
      
      const visualHighlightSection = document.getElementById('portfolio');
      if (!visualHighlightSection) return;

      const cards = Array.from(visualHighlightSection.querySelectorAll('.ios-project-card'));
      const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      cards.forEach((card, index) => {
        card.style.transitionDelay = `${index * 80}ms`;

        if (prefersReducedMotion) {
          return;
        }

        const resetCard = function() {
          card.style.setProperty('--glass-rotate-x', '0deg');
          card.style.setProperty('--glass-rotate-y', '0deg');
          card.style.setProperty('--glass-shine-x', '24%');
          card.style.setProperty('--glass-shine-y', '12%');
          card.style.setProperty('--image-shift-x', '0px');
          card.style.setProperty('--image-shift-y', '0px');
        };

        let rafId = null;

        const updateCard = function(event) {
          const rect = card.getBoundingClientRect();
          const px = Math.min(Math.max((event.clientX - rect.left) / rect.width, 0), 1);
          const py = Math.min(Math.max((event.clientY - rect.top) / rect.height, 0), 1);
          const rotateY = (px - 0.5) * 8;
          const rotateX = (0.5 - py) * 7;

          card.style.setProperty('--glass-rotate-x', `${rotateX}deg`);
          card.style.setProperty('--glass-rotate-y', `${rotateY}deg`);
          card.style.setProperty('--glass-shine-x', `${px * 100}%`);
          card.style.setProperty('--glass-shine-y', `${py * 100}%`);
          card.style.setProperty('--image-shift-x', `${(px - 0.5) * 10}px`);
          card.style.setProperty('--image-shift-y', `${(py - 0.5) * 8}px`);
        };

        resetCard();

        card.addEventListener('pointermove', function(event) {
          if (!card.classList.contains('is-visible')) return;
          if (rafId) cancelAnimationFrame(rafId);
          rafId = requestAnimationFrame(function() {
            updateCard(event);
          });
        });

        card.addEventListener('pointerleave', function() {
          if (rafId) cancelAnimationFrame(rafId);
          resetCard();
        });

        card.addEventListener('pointercancel', resetCard);
        card.addEventListener('blur', resetCard);
      });

      const revealCard = function(card) {
        card.classList.add('is-visible');
        if (prefersReducedMotion) {
          card.style.removeProperty('transition-delay');
          card.classList.add('is-visible');
        }
      };

      if (prefersReducedMotion) {
        cards.forEach((card) => {
          card.classList.add('is-visible');
          card.style.transitionDelay = '0ms';
        });
        return;
      }

      // Use Intersection Observer for scroll-triggered animations
      if ('IntersectionObserver' in window) {
        const cardObserver = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              revealCard(entry.target);
              cardObserver.unobserve(entry.target);
            }
          });
        }, {
          threshold: 0.1,
          rootMargin: '0px 0px -100px 0px'
        });

        cards.forEach(function(card) {
          cardObserver.observe(card);
        });
      } else {
        window.addEventListener('load', function() {
          cards.forEach(function(card) {
            setTimeout(function() {
              revealCard(card);
            }, 80);
          });
        });
      }
    })();
  </script>

  <!-- Loading Screen Handler -->
  <script>
    (function() {
      'use strict';
      
      const loadingScreen = document.getElementById('loadingScreen');
      const body = document.body;
      let resourcesLoaded = false;
      let minDisplayTime = 800; // Minimum display time in ms
      let startTime = Date.now();
      
      // Function to hide loading screen
      function hideLoadingScreen() {
        if (!loadingScreen) return;
        
        const elapsed = Date.now() - startTime;
        const remaining = Math.max(0, minDisplayTime - elapsed);
        
        setTimeout(function() {
          if (loadingScreen) {
            loadingScreen.classList.add('fade-out');
            setTimeout(function() {
              if (loadingScreen && loadingScreen.parentNode) {
                loadingScreen.style.display = 'none';
              }
              body.classList.add('loaded');
              body.style.overflow = '';
            }, 500); // Match CSS transition duration
          }
        }, remaining);
      }
      
      // Check if critical resources are loaded
      function checkResourcesLoaded() {
        if (resourcesLoaded) return true;
        
        // Check if fonts are loaded (if using font-display: swap, this helps)
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(function() {
            resourcesLoaded = true;
            hideLoadingScreen();
          }).catch(function() {
            // Fallback if fonts.ready fails
            resourcesLoaded = true;
            hideLoadingScreen();
          });
        } else {
          // Fallback for browsers without font loading API
          resourcesLoaded = true;
          hideLoadingScreen();
        }
      }
      
      // Hide loading screen when DOM and resources are ready
      if (document.readyState === 'complete') {
        checkResourcesLoaded();
      } else {
        window.addEventListener('load', function() {
          checkResourcesLoaded();
        });
        
        // Fallback: hide after maximum wait time
        setTimeout(function() {
          if (!resourcesLoaded) {
            resourcesLoaded = true;
            hideLoadingScreen();
          }
        }, 3000); // Maximum 3 seconds
      }
      
      // Also hide on DOMContentLoaded as fallback
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
          // Wait a bit for styles to apply
          setTimeout(checkResourcesLoaded, 100);
        });
      } else {
        setTimeout(checkResourcesLoaded, 100);
      }
    })();
  </script>

  <!-- Mobile Menu Script -->
  <script>
    (function() {
      'use strict';
      
      const mobileMenuToggle = document.getElementById('mobileMenuToggle');
      const mobileMenu = document.getElementById('mobileMenu');
      const body = document.body;
      
      if (!mobileMenuToggle || !mobileMenu) return;
      
      function toggleMobileMenu() {
        const isActive = mobileMenu.classList.contains('active');
        
        if (isActive) {
          closeMobileMenu();
        } else {
          openMobileMenu();
        }
      }
      
      function openMobileMenu() {
        mobileMenu.querySelectorAll('.mobile-nav-link').forEach(function(link) {
          link.classList.remove('active');
        });
        mobileMenu.classList.add('active');
        mobileMenuToggle.classList.add('active');
        mobileMenuToggle.setAttribute('aria-expanded', 'true');
        body.classList.add('menu-open');
      }
      
      function closeMobileMenu() {
        mobileMenu.classList.remove('active');
        mobileMenuToggle.classList.remove('active');
        mobileMenuToggle.setAttribute('aria-expanded', 'false');
        body.classList.remove('menu-open');
      }
      
      // Toggle menu on button click
      mobileMenuToggle.addEventListener('click', function(e) {
        e.stopPropagation();
        toggleMobileMenu();
      });
      
      // Close menu when clicking outside
      document.addEventListener('click', function(e) {
        if (mobileMenu.classList.contains('active')) {
          if (!mobileMenu.contains(e.target) && !mobileMenuToggle.contains(e.target)) {
            closeMobileMenu();
          }
        }
      });
      
      // Close menu on escape key
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && mobileMenu.classList.contains('active')) {
          closeMobileMenu();
        }
      });
      
      // Close menu on window resize (if resizing to desktop)
      let resizeTimer;
      window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function() {
          if (window.innerWidth >= 992 && mobileMenu.classList.contains('active')) {
            closeMobileMenu();
          }
        }, 250);
      });
      
      // Make closeMobileMenu available globally for onclick handlers
      window.closeMobileMenu = closeMobileMenu;
      
      // Update active nav link on scroll
      function updateActiveNavLink() {
        const sections = document.querySelectorAll('section[id], header[id]');
        const navLinks = document.querySelectorAll('.nav-link-ux');
        
        let current = '';
        sections.forEach(function(section) {
          const sectionTop = section.offsetTop;
          const sectionHeight = section.clientHeight;
          if (window.pageYOffset >= sectionTop - 100) {
            current = section.getAttribute('id');
          }
        });
        
        navLinks.forEach(function(link) {
          link.classList.remove('active');
          if (link.getAttribute('href') === '#' + current || 
              (current === 'home' && link.getAttribute('href') === '#home')) {
            link.classList.add('active');
          }
        });
      }
      
      // Update active link on scroll
      window.addEventListener('scroll', function() {
        updateActiveNavLink();
      });
      
      // Initial update
      updateActiveNavLink();
    })();
  </script>

  <!-- AOS Animation Init -->
  <script>
    // Initialize AOS with proper loading check
    function initAOS() {
      if (typeof AOS !== 'undefined') {
        AOS.init({
          once: true,
          duration: 400,        // Balanced duration for smooth animation
          offset: 80,            // Trigger when element is 80px from viewport
          delay: 0,              // No delay by default (individual elements can override)
          easing: 'ease-out',    // Smooth easing
          startEvent: 'DOMContentLoaded', // Start on DOM ready
          disable: false,        // Enable on all devices
          useClassNames: false,  // Don't use class names for performance
          disableMutationObserver: false, // Enable mutation observer for dynamic content
          debounceDelay: 50,     // Debounce delay for resize/scroll
          throttleDelay: 99,     // Throttle delay for scroll
        });
        
        // Refresh AOS after page fully loads to catch any missed elements
        window.addEventListener('load', function() {
          if (typeof AOS !== 'undefined') {
            AOS.refresh();
          }
        });
        
        // Refresh AOS on resize to recalculate positions
        let resizeTimer;
        window.addEventListener('resize', function() {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(function() {
            if (typeof AOS !== 'undefined') {
              AOS.refresh();
            }
          }, 150);
        });
      } else {
        // Retry if AOS not loaded yet (due to defer)
        setTimeout(initAOS, 50);
      }
    }
    
    // Start initialization after loading screen is hidden
    function startAOS() {
      if (document.body.classList.contains('loaded')) {
        initAOS();
      } else {
        // Wait for body to have 'loaded' class
        const observer = new MutationObserver(function(mutations) {
          if (document.body.classList.contains('loaded')) {
            initAOS();
            observer.disconnect();
          }
        });
        observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });
        
        // Fallback timeout
        setTimeout(initAOS, 1000);
      }
    }
    
    // Start initialization
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', startAOS);
    } else {
      startAOS();
    }
  </script>
