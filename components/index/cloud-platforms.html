<section id="cloud-platforms" class="container-fluid cloud-platforms-section">
  <div class="container">
    <div class="cloud-platforms-shell">
      <div class="cloud-platforms-header" data-aos="fade-up">
        <span class="cloud-platforms-kicker" data-i18n="cloud.kicker">Deployment Picks</span>
        <h2 class="profile-heading playfair-400 mb-2" style="color: #2c2c2c" data-i18n="cloud.title">
          Cloud & Hosting
        </h2>
        <p class="cloud-platforms-description mb-0" data-i18n="cloud.description">
          Platforms I like using when shipping and hosting products.
        </p>
      </div>

      <div class="cloud-platforms-grid">
        <article class="cloud-platform-card cloud-platform-railway" data-aos="fade-up" data-aos-delay="0" aria-label="Railway">
          <div class="cloud-platform-brand">
            <span class="cloud-platform-mark">
              <img src="https://cdn.simpleicons.org/railway/0B0D0E" alt="Railway" loading="lazy" />
            </span>
            <span class="cloud-platform-name">Railway</span>
          </div>
        </article>

        <article class="cloud-platform-card cloud-platform-vercel" data-aos="fade-up" data-aos-delay="50" aria-label="Vercel">
          <div class="cloud-platform-brand">
            <span class="cloud-platform-mark">
              <img src="https://cdn.simpleicons.org/vercel/FFFFFF" alt="Vercel" loading="lazy" />
            </span>
            <span class="cloud-platform-name">Vercel</span>
          </div>
        </article>

        <article class="cloud-platform-card cloud-platform-netlify" data-aos="fade-up" data-aos-delay="100" aria-label="Netlify">
          <div class="cloud-platform-brand">
            <span class="cloud-platform-mark">
              <img src="https://cdn.simpleicons.org/netlify/FFFFFF" alt="Netlify" loading="lazy" />
            </span>
            <span class="cloud-platform-name">Netlify</span>
          </div>
        </article>

        <article class="cloud-platform-card cloud-platform-render" data-aos="fade-up" data-aos-delay="150" aria-label="Render">
          <div class="cloud-platform-brand">
            <span class="cloud-platform-mark">
              <img src="https://cdn.simpleicons.org/render/000000" alt="Render" loading="lazy" />
            </span>
            <span class="cloud-platform-name">Render</span>
          </div>
        </article>
      </div>
    </div>
  </div>
</section>
