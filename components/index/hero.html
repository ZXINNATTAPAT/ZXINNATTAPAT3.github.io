  <!-- Animated Divider -->
  <div class="container-fluid" style="background-color: transparent; padding: 2rem 0 0 0;">
    <div class="container" style="padding-bottom: 0;">
      <div
        class="animate__fadeIn animate__animated shadow bg-cleanmain d-flex align-items-center justify-content-center text-center">
      </div>
    </div>
  </div>
</div>

  <script>
    // Toggle sticky-open for skill folders
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.skill-folder').forEach(function (el) {
        const toggle = function () { el.classList.toggle('open'); };
        el.addEventListener('click', toggle);
        el.addEventListener('keydown', function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); } });
      });
    });
  </script>
